services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toyow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/toyow
      REDIS_URL: redis://redis:6379
      FRONTEND_ORIGIN: http://localhost:5173

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:4000

volumes:
  pgdata:
  minio_data:
