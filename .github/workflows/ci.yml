name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: toyow
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/toyow
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret
      - name: Basic load test
        run: |
          npm install -g autocannon
          autocannon -c 20 -d 5 http://localhost:4000/health || true
